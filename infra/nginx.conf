worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=chat:10m rate=5r/s;

    # Upstreams
    upstream backend {
        server backend:5000;
    }
    upstream rasa {
        server rasa:5005;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        client_max_body_size 16m;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy no-referrer always;
        add_header Permissions-Policy "geolocation=()" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Common proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── Backend API routes ──
        location /api/          { limit_req zone=api burst=20 nodelay; proxy_pass http://backend; }
        location /auth/         { limit_req zone=api burst=20 nodelay; proxy_pass http://backend; }
        location /producto/     { limit_req zone=api burst=20 nodelay; proxy_pass http://backend; }
        location /carrito/      { limit_req zone=api burst=20 nodelay; proxy_pass http://backend; }
        location /orders/       { limit_req zone=api burst=20 nodelay; proxy_pass http://backend; }
        location /admin/orders/ { limit_req zone=api burst=20 nodelay; proxy_pass http://backend; }
        location /profile/      { limit_req zone=api burst=20 nodelay; proxy_pass http://backend; }
        location /subscriptions/{ limit_req zone=api burst=20 nodelay; proxy_pass http://backend; }
        location /handoff/      { limit_req zone=api burst=20 nodelay; proxy_pass http://backend; }
        location /classes/      { limit_req zone=api burst=20 nodelay; proxy_pass http://backend; }
        location /metrics       { limit_req zone=api burst=20 nodelay; proxy_pass http://backend; }
        location /notifications/{ limit_req zone=api burst=20 nodelay; proxy_pass http://backend; }
        location /nlu/          { limit_req zone=api burst=20 nodelay; proxy_pass http://backend; }

        # Chat endpoints (includes WebSocket for socket.io)
        location /chat/ {
            limit_req zone=chat burst=10 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Health & readiness
        location = /health { proxy_pass http://backend; }
        location = /ready  { proxy_pass http://backend; }

        # Socket.IO WebSocket upgrade
        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
        }

        # ── Rasa API (optional direct access) ──
        location /rasa/ {
            limit_req zone=chat burst=10 nodelay;
            rewrite ^/rasa/(.*)$ /$1 break;
            proxy_pass http://rasa;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Nginx health check
        location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok";
        }

        # Static assets (JS, CSS, images) — served from build
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # SPA fallback — all other routes serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ── HTTPS (uncomment when Let's Encrypt is configured) ──
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    #
    #     # ... (copy location blocks from port-80 server above)
    # }
    #
    # # Redirect HTTP to HTTPS
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }
}
