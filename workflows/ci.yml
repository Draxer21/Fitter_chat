name: CI

on:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend — tests y linting
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: fitter
          POSTGRES_PASSWORD: fitter
          POSTGRES_DB: fitter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://fitter:fitter@localhost:5432/fitter_test
      PROFILE_ENCRYPTION_KEY: ${{ secrets.PROFILE_ENCRYPTION_KEY }}
      FLASK_ENV: testing

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Linting con flake8
        run: |
          pip install flake8
          flake8 backend/ --max-line-length=120 --exclude=migrations/

      - name: Ejecutar tests
        run: python -m pytest backend/tests/ -v

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Build de producción
        working-directory: frontend
        run: npm run build
        env:
          CI: false